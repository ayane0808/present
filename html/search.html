<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>探す - GiftFinder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/nouislider@15.7.0/dist/nouislider.min.css">
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/pages.css" />

  <style>
    .search-mode-bar {
      display: flex;
      background: var(--nav-bg);
      border-bottom: 2px solid var(--light-border);
      position: sticky;
      top: 66px;
      z-index: 100;
      backdrop-filter: blur(24px);
    }

    .search-mode-btn {
      flex: 1;
      padding: 16px 0;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Noto Sans JP', sans-serif;
      border: none;
      background: transparent;
      color: var(--sumi2);
      cursor: pointer;
      transition: all 0.2s;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      letter-spacing: 0.03em;
    }

    .search-mode-btn.active {
      color: var(--sakura);
      border-bottom-color: var(--sakura);
      background: linear-gradient(135deg, rgba(255,107,138,0.05), rgba(244,164,53,0.03));
    }

    .search-mode-btn:hover:not(.active) {
      background: rgba(255,107,138,0.05);
      color: var(--sumi);
    }

    /* search.jsが操作するIDに合わせたクラス */
    #search-button-mode { display: block; }
    #search-ai-mode { display: none; }

    .search-screen-button {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
      padding: 32px;
      animation: fadeIn 0.2s ease;
    }

    @media (max-width: 768px) {
      .search-screen-button { grid-template-columns: 1fr; padding: 18px 16px; }
    }

    .search-screen-ai {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 130px);
      padding: 24px 32px;
      animation: fadeIn 0.2s ease;
    }

    @media (max-width: 768px) {
      .search-screen-ai { padding: 16px; }
    }

    .chat-box-full {
      flex: 1;
      overflow-y: auto;
      background: var(--washi);
      border-radius: 22px;
      padding: 20px;
      margin-bottom: 12px;
      border: 1.5px solid var(--light-border);
      box-shadow: var(--shadow-sm);
    }

    .chat-input-row-full { display: flex; gap: 10px; align-items: center; }
    .chat-input-row-full .input-field { flex: 1; }

    .chat-send-full {
      padding: 13px 26px;
      background: linear-gradient(135deg, var(--sakura), var(--kogane));
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(255,107,138,0.32);
      transition: all 0.2s;
    }

    .chat-send-full:hover { transform: translateY(-2px); box-shadow: 0 8px 26px rgba(255,107,138,0.38); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div id="toast"></div>

<header id="header">
  <div class="header-inner">
    <a href="index.html" class="logo">
      <span class="logo-icon">🎁</span>
      <div class="logo-texts">
        <span class="logo-text">GiftFinder</span>
        <span class="logo-tagline">心を贈る、最高の一品を</span>
      </div>
    </a>
    <nav class="nav-links">
      <a href="index.html" class="nav-link" data-page="home"><span class="nl-icon">🏠</span><span class="nl-label">ホーム</span></a>
      <a href="search.html" class="nav-link" data-page="search"><span class="nl-icon">🔍</span><span class="nl-label">探す</span></a>
      <a href="post.html" class="nav-link" data-page="post"><span class="nl-icon">✍️</span><span class="nl-label">投稿</span></a>
      <a href="auth.html" class="nav-link" data-page="auth"><span class="nl-icon">👤</span><span class="nl-label">アカウント</span></a>
    </nav>
    <button id="hamburger" onclick="toggleDrawer()"><span></span><span></span><span></span></button>
  </div>
</header>

<div id="mobile-drawer">
  <a href="index.html" class="drawer-link" data-page="home"><span class="dl-icon">🏠</span>ホーム</a>
  <a href="search.html" class="drawer-link" data-page="search"><span class="dl-icon">🔍</span>プレゼントを探す</a>
  <div class="drawer-divider"></div>
  <a href="post.html" class="drawer-link" data-page="post"><span class="dl-icon">✍️</span>口コミを投稿</a>
  <a href="auth.html" class="drawer-link" data-page="auth"><span class="dl-icon">👤</span>アカウント</a>
</div>

<div id="app">

  <!-- ===== 上部モード切り替えバー ===== -->
  <div class="search-mode-bar">
    <button class="search-mode-btn active" id="tab-button" onclick="setSearchMode('button')">
      🎯 条件で探す
    </button>
    <button class="search-mode-btn" id="tab-ai" onclick="setSearchMode('ai')">
      🤖 AIに相談する
    </button>
  </div>

  <!-- ===== 条件検索モード ===== -->
  <div class="search-screen-button">
    <div>
      <div class="search-panel">
        <div class="search-panel-title">🔍 絞り込み条件</div>

        <div id="search-button-mode">
          <div class="filter-section">
            <div class="filter-label">👤 相手の年代</div>
            <select class="select-field" id="filter-age">
              <option value="">指定なし</option>
              <option>10代</option>
              <option>20代</option>
              <option>30代</option>
              <option>40代</option>
              <option>50代</option>
              <option>60代以上</option>
            </select>
          </div>
          <div class="filter-section">
            <div class="filter-label">♀♂ 相手の性別</div>
            <select class="select-field" id="filter-gender">
              <option value="">指定なし</option>
              <option>男性</option>
              <option>女性</option>
              <option>どちらでも</option>
            </select>
          </div>
          <div class="filter-section">
            <div class="filter-label">💑 相手との関係</div>
            <div id="chips-relation" class="chips-wrap"></div>
          </div>
          <div class="filter-section">
            <div class="filter-label">🎉 シーン</div>
            <div id="chips-scene" class="chips-wrap"></div>
          </div>
          <div class="filter-section">
            <div class="filter-label">🏷 カテゴリ</div>
            <div id="chips-category" class="chips-wrap"></div>
          </div>
          <div class="filter-section">
            <div class="filter-label" style="display: flex; justify-content: space-between;">
              <span>💰 予算</span>
              <span id="price-value" style="color: var(--sakura); font-weight: 900;">¥0 - ¥50,000+</span>
            </div>
            <div style="padding: 0 10px 10px;">
              <div id="price-slider"></div>
            </div>
          </div>
          <button class="btn-primary full" onclick="handleSearch()">🔍 この条件で探す</button>
        </div>

        <div id="search-ai-mode">
          <div class="chat-box" id="chat-box"></div>
          <div class="chat-input-row">
            <input
                    type="text"
                    class="input-field"
                    id="chat-input"
                    placeholder="例：30代女性の友人への誕生日プレゼント"
                    style="flex: 1"
                    onkeydown="if (event.key === 'Enter') handleChatSend();"
            />
            <button class="chat-send" id="chat-send-btn" onclick="handleChatSend()">→</button>
          </div>
        </div>

      </div>
    </div>

    <div id="search-results-area">
      <div class="empty-state">
        <div class="es-icon">🌸</div>
        <div class="es-title">条件を選んで探してみましょう</div>
        <div class="es-sub">左のパネルで条件を絞り込んで<br />ぴったりのプレゼントを見つけてください。</div>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/nouislider@15.7.0/dist/nouislider.min.js"></script>
<script type="module" src="../js/search.js"></script>
</body>
</html>
