<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>アカウント - GiftFinder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/pages.css" />
  </head>
  <body>
    <div id="toast"></div>
    <header id="header">
      <div class="header-inner">
        <a href="index.html" class="logo">
          <span class="logo-icon">🎁</span>
          <div class="logo-texts">
            <span class="logo-text">GiftFinder</span>
            <span class="logo-tagline">心を贈る、最高の一品を</span>
          </div>
        </a>
        <nav class="nav-links">
          <a href="index.html" class="nav-link" data-page="home"
            ><span class="nl-icon">🏠</span
            ><span class="nl-label">ホーム</span></a
          >
          <a href="search.html" class="nav-link" data-page="search"
            ><span class="nl-icon">🔍</span
            ><span class="nl-label">探す</span></a
          >
          <a href="post.html" class="nav-link" data-page="post"
            ><span class="nl-icon">✍️</span
            ><span class="nl-label">投稿</span></a
          >
          <a href="auth.html" class="nav-link" data-page="auth"
            ><span class="nl-icon">👤</span
            ><span class="nl-label">アカウント</span></a
          >
        </nav>
        <button id="hamburger" onclick="toggleDrawer()">
          <span></span><span></span><span></span>
        </button>
      </div>
    </header>

    <div id="mobile-drawer">
      <a href="index.html" class="drawer-link" data-page="home"
        ><span class="dl-icon">🏠</span>ホーム</a
      >
      <a href="search.html" class="drawer-link" data-page="search"
        ><span class="dl-icon">🔍</span>プレゼントを探す</a
      >
      <div class="drawer-divider"></div>
      <a href="post.html" class="drawer-link" data-page="post"
        ><span class="dl-icon">✍️</span>口コミを投稿</a
      >
      <a href="auth.html" class="drawer-link" data-page="auth"
        ><span class="dl-icon">👤</span>アカウント</a
      >
    </div>

    <div id="app">
      <div class="content-wrap">
        <div class="account-wrap">
          <h2 class="section-title">アカウント</h2>

          <div id="account-logged-in" style="display: none">
            <div class="profile-card">
              <div class="profile-avatar">👤</div>
              <h2 class="profile-name" id="profile-name"></h2>
              <p class="profile-sub" id="profile-sub"></p>
            </div>
            <div class="profile-field">
              <div class="profile-field-label">ID</div>
              <div class="profile-field-value" id="profile-id"></div>
            </div>
            <button class="btn-logout" onclick="handleLogout()">
              ログアウト
            </button>
          </div>

          <div id="account-auth">
            <div class="auth-tabs">
              <button
                class="auth-tab active"
                id="auth-tab-login"
                onclick="setAuthMode('login')"
              >
                ログイン
              </button>
              <button
                class="auth-tab"
                id="auth-tab-register"
                onclick="setAuthMode('register')"
              >
                新規登録
              </button>
            </div>
            <h3
              class="section-title"
              id="auth-title"
              style="font-size: 20px; margin-bottom: 22px"
            >
              ログイン
            </h3>

            <div id="register-fields" style="display: none">
              <div class="auth-group">
                <label class="auth-field-label">お名前</label
                ><input
                  type="text"
                  class="input-field"
                  id="auth-name"
                  placeholder="山田 太郎"
                />
              </div>
              <div class="auth-group">
                <label class="auth-field-label">年代</label
                ><select class="select-field" id="auth-age">
                  <option>20代</option>
                  <option>30代</option>
                </select>
              </div>
              <div class="auth-group">
                <label class="auth-field-label">性別</label
                ><select class="select-field" id="auth-gender">
                  <option>男性</option>
                  <option>女性</option>
                </select>
              </div>
            </div>

            <div class="auth-group">
              <label class="auth-field-label">ID</label
              ><input
                type="text"
                class="input-field"
                id="auth-id"
                placeholder="user_id"
              />
            </div>
            <div class="auth-group" style="margin-bottom: 20px">
              <label class="auth-field-label">パスワード</label
              ><input
                type="password"
                class="input-field"
                id="auth-password"
                placeholder="••••••••"
              />
            </div>

            <p class="auth-demo" id="auth-demo-hint">
              🔑 デモ: ID「demo」 / パスワード「demo」
            </p>
            <button
              class="btn-primary full"
              id="auth-submit-btn"
              onclick="handleAuth()"
            >
              ログイン
            </button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="../js/auth.js"></script>
  </body>
</html>
