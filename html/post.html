<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>投稿 - GiftFinder</title>
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/pages.css" />
  </head>
  <body>
    <div id="toast"></div>
    <div id="app">
      <div class="content-wrap">
        <a href="index.html" class="back-btn">← 戻る</a>
        <div class="post-wrap">
          <h2 class="section-title">口コミを投稿</h2>
          <p class="section-sub">
            あなたのプレゼント体験を共有して、みんなの「最高の贈り物」探しを応援しましょう
            🌸
          </p>
          <div id="post-login-warn" class="post-warn" style="display: none">
            ⚠️ 投稿するにはログインが必要です
          </div>

          <div class="form-group">
            <label class="form-label">⭐️ 商品名（必須）</label>
            <input
              type="text"
              class="input-field"
              id="post-product"
              placeholder="例：バルミューダ トースター"
            />
          </div>
          <div class="form-group">
            <label class="form-label">🏷 カテゴリ</label>
            <div id="post-chips-category" class="chips-wrap"></div>
          </div>
          <div class="form-group">
            <label class="form-label">🎉 シーン</label>
            <div id="post-chips-scene" class="chips-wrap"></div>
          </div>
          <div class="form-group">
            <label class="form-label">💑 相手との関係</label>
            <div id="post-chips-relation" class="chips-wrap"></div>
          </div>
          <div class="form-group">
            <label class="form-label">⭐️ レビュー（必須）</label>
            <textarea
              class="input-field"
              id="post-review"
              rows="4"
              placeholder="もらって嬉しかった理由、相手の反応などを教えてください！"
            ></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">🔗 商品URL（任意）</label>
            <input
              type="text"
              class="input-field"
              id="post-url"
              placeholder="https://..."
            />
          </div>
          <button class="btn-primary full" onclick="handlePost()">
            🌸 投稿する
          </button>
        </div>
      </div>
    </div>

    <script src="../js/supabase.js"></script>
    <script src="../js/post.js"></script>
  </body>
</html>
